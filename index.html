<body>

<div id="custom-alert"></div>

<div id="ganador-modal">

<!-- SECCIÓN SCANNER QR -->

<!-- TABLAS REGISTRADAS -->

        <span class="hist-label">Últimas 5</span>
        <div id="hist-container"></div>
    </div>

</div>

<script>
    let tablas = [], sequence = [], balotasSacadas = [], ultimas5 = [];
    let acumulados = { B:[], I:[], N:[], G:[], O:[] };
    let ganadorLetraId = null, ganadorLlenoId = null;
    let ventanaExterna = null;
    
    // VARIABLES PARA SISTEMA QR
    let tablasRegistradas = new Set(); // Tablas ya registradas en el juego actual
    let scannerActivo = false;
    let html5QrCode = null;
    
    // VARIABLES PARA MULTIPLAYER
    let gameSessionId = null;
    let isHost = false; // true si esta instancia controla el juego

    function lanzarAlerta(msj, tipo) {
        const el = document.getElementById('custom-alert');
        el.innerText = msj;
        el.className = tipo === 'ok' ? 'alert-success' : 'alert-error';
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function verificarTablaManual() {
        const id = parseInt(document.getElementById('check-id').value);
        if(!id) return;
        const tabla = tablas.find(t => t.id === id);
        if(!tabla) return alert("Esa tabla no está en juego.");
        document.querySelectorAll('.card').forEach(c => c.classList.remove('searching'));
        const res = verificarGanadorInterno(tabla);
        const card = document.getElementById(`card-${id}`);
        card.classList.add('searching');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        const modo = document.getElementById('modo-juego').value;
        let gano = (modo === "solo_letra" && res.tieneLetra) || (modo === "solo_lleno" && res.tieneLleno) || (res.tieneLetra || res.tieneLleno);
        
        if(gano) {
            lanzarAlerta("¡CORRECTO! TABLA #" + id + " GANADORA", "ok");
        } else {
            lanzarAlerta("¡TABLA #" + id + " NO HA GANADO AÚN!", "error");
        }
        mostrarTablaEnGrande(tabla, gano, res);
    }

    function mostrarTablaEnGrande(t, gano = true, res = null) {
        const fig = document.getElementById('tipo-figura').value;
        const modo = document.getElementById('modo-juego').value;
        const cols = ['B','I','N','G','O'];
        let html = `<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
        
        for (let r = 0; r < 5; r++) {
            html += `<tr>`;
            cols.forEach((col, cIndex) => {
                let val = t.data[col][r];
                let esParteFigura = false;
                if(fig === "solo_lleno") {
                    esParteFigura = true;
                } else if(fig === "medio_lleno") {
                    esParteFigura = (cIndex >= 1 && cIndex <= 3);
                } else if(modo === "solo_lleno") {
                    esParteFigura = true;
                } else if(modo === "lleno_ing") {
                    esParteFigura = (cIndex >= 1 && cIndex <= 3);
                } else {
                    esParteFigura = (fig === "L" && (cIndex === 0 || r === 4)) || (fig === "O" && (r === 0 || r === 4 || cIndex === 0 || cIndex === 4)) || (fig === "X" && (cIndex === r || cIndex === (4-r))) || (fig === "Z" && (r === 0 || r === 4 || cIndex === (4-r))) || (fig === "cruz_p" && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3))) || (fig === "cruz_g" && (cIndex === 2 || r === 2)) || (fig === "L_ing" && ((cIndex === 1) || (r === 4 && cIndex >= 1 && cIndex <= 3))) || (fig === "cruz_p_ing" && cIndex >= 1 && cIndex <= 3 && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3))) || (fig === "cuatro_esquinas_ing" && cIndex >= 1 && cIndex <= 3 && ((r === 0 && (cIndex === 1 || cIndex === 3)) || (r === 4 && (cIndex === 1 || cIndex === 3))));
                }
                
                let esParteLleno = false;
                if(modo === "lleno_ing" || modo === "letra_medio_ing") {
                    esParteLleno = (cIndex >= 1 && cIndex <= 3);
                } else if(modo === "solo_lleno") {
                    esParteLleno = true;
                } else if(modo === "cruz_pequena_ing") {
                    esParteLleno = (cIndex >= 1 && cIndex <= 3) && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3));
                } else if(modo === "cuatro_esquinas") {
                    esParteLleno = (r === 0 && cIndex === 0) || (r === 0 && cIndex === 4) || (r === 4 && cIndex === 0) || (r === 4 && cIndex === 4);
                } else {
                    esParteLleno = true; // Para "letra_y_entera"
                }
                
                let clase = "";
                if(val === null) clase = "free-cell";
                else if(gano && res && res.tieneLetra && res.tieneLleno && modo.includes("letra")) {
                    // Modo mixto: mostrar ambas partes en azul si ambas ganaron
                    if(esParteFigura || esParteLleno) clase = "figura-azul";
                    else if(balotasSacadas.includes(val)) clase = "marked";
                    else clase = "no-sorteado";
                } else if(gano && res && res.tieneLetra && modo.includes("letra")) {
                    // Mostrar SOLO la letra en azul
                    if(esParteFigura && balotasSacadas.includes(val)) clase = "figura-azul";
                    else if(esParteFigura) clase = "figura-falta";
                    else if(balotasSacadas.includes(val)) clase = "marked";
                    else clase = "no-sorteado";
                } else if(gano && res && res.tieneLleno && !modo.includes("solo_letra")) {
                    // Mostrar SOLO el lleno/medio lleno en azul
                    if(esParteLleno && balotasSacadas.includes(val)) clase = "figura-azul";
                    else if(esParteLleno) clase = "figura-falta";
                    else if(balotasSacadas.includes(val)) clase = "marked";
                    else clase = "no-sorteado";
                } else if(!gano) {
                    // Tabla no ganó: mostrar qué falta en rojo
                    if(esParteFigura || esParteLleno) {
                        clase = balotasSacadas.includes(val) ? "figura-azul" : "figura-falta";
                    } else if(balotasSacadas.includes(val)) clase = "marked";
                    else clase = "no-sorteado";
                } else {
                    // Fallback
                    if(balotasSacadas.includes(val)) clase = "marked";
                    else clase = "no-sorteado";
                }

                html += `<td class="${clase}">${val === null ? 'FREE' : val}</td>`;
            });
            html += `</tr>`;
        }
        html += `</table>`;
        
        let titulo = "TABLA #" + t.id;
        if(gano) {
            if(res && res.tieneLetra && modo.includes("letra")) titulo += " - GANADORA (LETRA)";
            else if(res && res.tieneLleno) titulo += " - GANADORA (LLENO)";
            else titulo += " GANADORA!";
        } else {
            titulo += " - INCOMPLETA";
        }
        
        document.getElementById('modal-titulo').innerText = titulo;
        document.getElementById('modal-tabla-space').innerHTML = html;
        document.getElementById('ganador-modal').style.display = 'flex';
    }

    function dibujarMapaGuia() {
        const fig = document.getElementById('tipo-figura').value;
        const modo = document.getElementById('modo-juego').value;
        let html = "";
        for(let r=0; r<5; r++) {
            for(let c=0; c<5; c++) {
                let isTarget = false;
                if(modo === "solo_lleno") {
                    isTarget = true;
                } else if(modo === "lleno_ing") {
                    isTarget = (c >= 1 && c <= 3);
                } else {
                    isTarget = (fig === "L" && (c === 0 || r === 4)) || (fig === "O" && (r === 0 || r === 4 || c === 0 || c === 4)) || (fig === "X" && (c === r || c === (4-r))) || (fig === "Z" && (r === 0 || r === 4 || c === (4-r))) || (fig === "cruz_p" && ((c === 2 && r >= 1 && r <= 3) || (r === 2 && c >= 1 && c <= 3))) || (fig === "cruz_g" && (c === 2 || r === 2)) || (fig === "L_ing" && ((c === 1) || (r === 4 && c >= 1 && c <= 3))) || (fig === "cruz_p_ing" && c >= 1 && c <= 3 && ((c === 2 && r >= 1 && r <= 3) || (r === 2 && c >= 1 && c <= 3))) || (fig === "cuatro_esquinas_ing" && c >= 1 && c <= 3 && ((r === 0 && (c === 1 || c === 3)) || (r === 4 && (c === 1 || c === 3))));
                }
                html += `<div class="m-cell ${isTarget?'target':''}"></div>`;
            }
        }
        document.getElementById('guia-visual').innerHTML = html;
    }

    function generarColumnaFija(min, max, seed) {
        let nums = []; let localSeed = seed;
        while(nums.length < 5) {
            localSeed = (localSeed * 9301 + 49297) % 233280;
            let val = min + Math.floor((localSeed / 233280) * (max - min + 1));
            if(!nums.includes(val)) nums.push(val);
        }
        return nums.sort((a,b) => a-b);
    }

    function iniciarBingoFijo() {
        const input = document.getElementById('lista-tablas').value;
        
        let idsTablas = [];
        
        // Si hay tablas registradas por QR, usar esas
        if(tablasRegistradas.size > 0) {
            idsTablas = Array.from(tablasRegistradas);
            document.getElementById('lista-tablas').value = idsTablas.join(', ');
        } 
        // Si no hay QR registrados, intentar usar entrada manual
        else if(input.trim()) {
            idsTablas = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        }
        
        if(idsTablas.length === 0) {
            return alert("❌ No hay tablas registradas. Escanea códigos QR usando el botón 'SCANNER QR 📱' o ingresa números manualmente (ej: 1, 5, 20)");
        }
        
        // VALIDAR TABLAS REPETIDAS
        const idsUnicos = new Set(idsTablas);
        if(idsUnicos.size !== idsTablas.length) {
            const duplicadas = idsTablas.filter((id, index) => idsTablas.indexOf(id) !== index);
            return alert("❌ ERROR: Tablas REPETIDAS encontradas: " + [...new Set(duplicadas)].join(', ') + "\n\nNo puedes cargar tablas duplicadas. Por favor usa números diferentes.");
        }
        tablas = []; balotasSacadas = []; ultimas5 = [];
        acumulados = { B:[], I:[], N:[], G:[], O:[] };
        ganadorLetraId = null; ganadorLlenoId = null;
        document.getElementById('grid-tablas').innerHTML = "";
        ['B','I','N','G','O'].forEach(l => document.getElementById(`row-${l}`).innerHTML = "");
        document.getElementById('status-board').innerHTML = "¡JUEGO INICIADO!";
        document.getElementById('btn-draw').style.display = "inline-block";
        initHistorialUI();
        dibujarMapaGuia();
        idsTablas.forEach(id => {
            let t = { id: id, data: {
                B: generarColumnaFija(1, 15, id * 100), I: generarColumnaFija(16, 30, id * 200),
                N: generarColumnaFija(31, 45, id * 300), G: generarColumnaFija(46, 60, id * 400),
                O: generarColumnaFija(61, 75, id * 500)
            }};
            t.data.N[2] = null;
            tablas.push(t);
            renderTabla(t);
        });
        sequence = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        if(ventanaExterna && !ventanaExterna.closed) actualizarVentanaExterna();
    }

    function initHistorialUI() {

        document.getElementById('hist-container').innerHTML = h;
    }

    function renderTabla(t) {
        let html = `<div class="card" id="card-${t.id}"><h3>TABLA #${t.id}</h3><table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
        for (let f = 0; f < 5; f++) {
            html += `<tr>${['B','I','N','G','O'].map(l => {
                let val = t.data[l][f];
                if(val === null) return `<td class="free-cell">FREE</td>`;
                return `<td id="t${t.id}-${val}">${val}</td>`;
            }).join('')}</tr>`;

    function sacarBalota() {
        if(sequence.length === 0) return; // PERMITIR CONTINUAR HASTA QUE SE ACABEN LAS BALOTAS
        let n = sequence.shift();
        let l = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
        balotasSacadas.push(n);
        acumulados[l].push(n); acumulados[l].sort((a,b) => a-b);
        document.getElementById(`row-${l}`).innerHTML = acumulados[l].map(num => `<span>${num}</span>`).join('');
        ultimas5.unshift({l, n}); if(ultimas5.length > 5) ultimas5.pop();
        ultimas5.forEach((val, i) => {
            let el = document.getElementById(`hb-${i}`);
            el.innerHTML = `<div class="h-letra">${val.l}</div><div class="h-num">${val.n}</div>`;
            el.classList.add('active');
        });
        
        // REINICIAR ANIMACIÓN DE BALOTA
        const display = document.getElementById('balota-display');
        display.classList.remove('rolling-animation');
        void display.offsetWidth; // TRUCO PARA REINICIAR CSS
        display.classList.add('rolling-animation');
        
        document.getElementById('display-l').innerText = l;
        document.getElementById('display-n').innerText = n;
        
        for (let t of tablas) {
            let cell = document.getElementById(`t${t.id}-${n}`);
            if(cell) cell.classList.add('marked');
            let res = verificarGanadorInterno(t);
            let modo = document.getElementById('modo-juego').value;
            if (ganadorLetraId === null && res.tieneLetra && modo !== "solo_lleno" && modo !== "lleno_ing" && modo !== "cruz_pequena_ing" && modo !== "cuatro_esquinas") {
                ganadorLetraId = t.id;
                document.getElementById(`card-${t.id}`).classList.add('winner-letra');
                actualizarStatus();
                cantarBingo("Figura", t.id);
            }
            if (ganadorLlenoId === null && res.tieneLleno) {
                if (t.id === ganadorLetraId) continue;
                ganadorLlenoId = t.id;
                document.getElementById(`card-${t.id}`).classList.add('winner-lleno');
                actualizarStatus();
                actualizarVentanaExterna();
                cantarBingo("Bingo Lleno", t.id);
                // NO TERMINAR EL JUEGO - PERMITIR CONTINUAR
            }
        }
        actualizarVentanaExterna();
        updateFirebase(); // Sincronizar con Firebase
    }

    function verificarGanadorInterno(t) {
        const fig = document.getElementById('tipo-figura').value, modo = document.getElementById('modo-juego').value;
        const cols = ['B','I','N','G','O'];
        let tieneLetra = true, tieneLleno = true;
        for(let r=0; r<5; r++) {
            cols.forEach((col, cIndex) => {
                let num = t.data[col][r]; if(num === null) return;
                if(modo === "lleno_ing") { if((col==='I' || col==='N' || col==='G') && !balotasSacadas.includes(num)) tieneLleno = false; }
                else if(modo === "letra_medio_ing") { 
                    if((col==='I' || col==='N' || col==='G') && !balotasSacadas.includes(num)) tieneLleno = false;
                }
                else if(modo === "cruz_pequena_ing") {
                    let isCruzIng = (col==='I' || col==='N' || col==='G') && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3));
                    if(isCruzIng && !balotasSacadas.includes(num)) tieneLleno = false;
                }
                else if(modo === "cuatro_esquinas") {
                    let isEsquina = (r === 0 && cIndex === 0) || (r === 0 && cIndex === 4) || (r === 4 && cIndex === 0) || (r === 4 && cIndex === 4);
                    if(isEsquina && !balotasSacadas.includes(num)) tieneLleno = false;
                }
                else { if(!balotasSacadas.includes(num)) tieneLleno = false; }
                let esParte = (fig === "L" && (cIndex === 0 || r === 4)) || (fig === "O" && (r === 0 || r === 4 || cIndex === 0 || cIndex === 4)) || (fig === "X" && (cIndex === r || cIndex === (4-r))) || (fig === "Z" && (r === 0 || r === 4 || cIndex === (4-r))) || (fig === "cruz_p" && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3))) || (fig === "cruz_g" && (cIndex === 2 || r === 2)) || (fig === "L_ing" && ((cIndex === 1) || (r === 4 && cIndex >= 1 && cIndex <= 3))) || (fig === "cruz_p_ing" && cIndex >= 1 && cIndex <= 3 && ((cIndex === 2 && r >= 1 && r <= 3) || (r === 2 && cIndex >= 1 && cIndex <= 3))) || (fig === "cuatro_esquinas_ing" && cIndex >= 1 && cIndex <= 3 && ((r === 0 && (cIndex === 1 || cIndex === 3)) || (r === 4 && (cIndex === 1 || cIndex === 3))));
                if(esParte && !balotasSacadas.includes(num)) tieneLetra = false;
            });
        }
        return { tieneLetra, tieneLleno };
    }

    function startScanner() {
        if(!html5QrCode) {
            html5QrCode = new Html5Qrcode("qr-reader");
        }
        
        html5QrCode.start(
            { facingMode: "environment" }, // Usar cámara trasera
            {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            },
            onScanSuccess,
            onScanFailure
        ).then(() => {
            scannerActivo = true;
            document.getElementById('scanner-status').innerHTML = '<span style="color: #22c55e;">📱 ESCANEANDO... Apunta al código QR</span>';
        }).catch(err => {
            console.error("Error al iniciar scanner:", err);
            document.getElementById('scanner-status').innerHTML = '<span style="color: #ef4444;">❌ Error al acceder a la cámara</span>';
        });

    function stopScanner() {
        if(html5QrCode && scannerActivo) {
            html5QrCode.stop().then(() => {
                scannerActivo = false;
                document.getElementById('scanner-status').innerHTML = '<span style="color: #64748b;">⏹️ Scanner detenido</span>';
            });
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Procesar el código QR escaneado
        console.log("QR escaneado:", decodedText);
        
        // Extraer el número de tabla del QR (formato: "TABLA:1")
        const match = decodedText.match(/TABLA:(\d+)/);
        if(match) {
            const tablaId = parseInt(match[1]);
            registrarTablaQR(tablaId);
        } else {
            document.getElementById('scanner-status').innerHTML = '<span style="color: #ef4444;">❌ Código QR inválido</span>';
        }
    }

    function onScanFailure(error) {
        // No hacer nada en caso de error de escaneo (es normal)
    }

    function registrarTablaQR(tablaId) {
        if(tablaId < 1 || tablaId > 50) {
            document.getElementById('scanner-status').innerHTML = '<span style="color: #ef4444;">❌ Número de tabla inválido (1-50)</span>';
            return;
        }
        
        if(tablasRegistradas.has(tablaId)) {
            document.getElementById('scanner-status').innerHTML = `<span style="color: #ef4444;">❌ Tabla #${tablaId} ya está registrada</span>`;
            lanzarAlerta(`Tabla #${tablaId} ya está registrada en el juego`, "error");
            return;
        }
        
        // REGISTRAR LOCALMENTE
        tablasRegistradas.add(tablaId);
        
        // ACTUALIZAR INTERFAZ
        const currentList = document.getElementById('lista-tablas').value;
        const ids = currentList ? currentList.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n)) : [];
        ids.push(tablaId);
        document.getElementById('lista-tablas').value = ids.join(', ');
        actualizarListaTablas();
        
        // --- SINCRONIZACIÓN CLAVE ---
        if(gameSessionId) {
            // Si soy el Host (PC), uso la función normal
            if(isHost) {
                updateFirebase();
            } else {
                // Si soy el Celular (Cliente), envío SOLO la tabla nueva a la lista de Firebase
                database.ref('games/' + gameSessionId + '/tablasRegistradas').once('value').then((snapshot) => {
                    let tablasRemotas = snapshot.val() || [];
                    if(!tablasRemotas.includes(tablaId)) {
                        tablasRemotas.push(tablaId);
                        database.ref('games/' + gameSessionId + '/tablasRegistradas').set(tablasRemotas);
                    }
                });
            }
        }
        
        document.getElementById('scanner-status').innerHTML = `<span style="color: #22c55e;">✅ Tabla #${tablaId} sincronizada</span>`;
        lanzarAlerta(`¡Tabla #${tablaId} registrada!`, "ok");
        
        if(navigator.vibrate) {
            navigator.vibrate(200);
        }
    }

    function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Configurar página
        doc.setFontSize(20);
        doc.text('Códigos QR - Tablas de Bingo', 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.text('Cada tabla tiene su código QR fijo y único', 105, 30, { align: 'center' });
        
        let yPosition = 50;
        let xPosition = 20;
        const qrSize = 40; // Tamaño del QR en el PDF
        const itemsPerRow = 4;
        let itemCount = 0;
        
        // Función para agregar QR al PDF
        const agregarQRAlPDF = async (numeroTabla) => {
            return new Promise((resolve) => {
                // Crear canvas temporal para el QR
                const tempCanvas = document.createElement('canvas');
                QRCode.toCanvas(tempCanvas, `TABLA:${numeroTabla}`, {
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    errorCorrectionLevel: 'M'
                }).then(() => {
                    // Convertir canvas a imagen para jsPDF
                    const imgData = tempCanvas.toDataURL('image/png');
                    
                    // Agregar al PDF
                    doc.addImage(imgData, 'PNG', xPosition, yPosition, qrSize, qrSize);
                    doc.setFontSize(10);
                    doc.text(`Tabla ${numeroTabla}`, xPosition + qrSize/2, yPosition + qrSize + 8, { align: 'center' });
                    
                    itemCount++;
                    
                    // Calcular posición para siguiente item
                    if (itemCount % itemsPerRow === 0) {
                        yPosition += qrSize + 20;
                        xPosition = 20;
                        
                        // Nueva página si es necesario
                        if (yPosition > 250) {
                            doc.addPage();
                            yPosition = 30;
                        }
                    } else {
                        xPosition += qrSize + 15;
                    }
                    
                    resolve();
                });
            });
        };
        
        // Generar todos los QR en secuencia
        const promises = [];
        for (let i = 1; i <= 50; i++) {
            promises.push(agregarQRAlPDF(i));
        }
        
        // Ejecutar todas las promesas y guardar PDF
        Promise.all(promises).then(() => {
            doc.save('Codigos_QR_Bingo_Fijos.pdf');
            lanzarAlerta("¡PDF descargado! Los códigos QR son fijos y únicos para cada tabla", "ok");
        }).catch(error => {
            console.error('Error generando PDF:', error);
            lanzarAlerta("Error al generar PDF. Intenta de nuevo.", "error");
        });
    }

   function createGameSession() {

        isHost = true;

        // Intentar copiar automáticamente al portapapeles
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(gameSessionId).then(() => {
                // Si se copia con éxito, avisamos con un prompt por si acaso
                prompt("¡ID generado y COPIADO al portapapeles! Úsalo para unirte:", gameSessionId);
            }).catch(err => {
                // Si falla el copiado automático (por permisos del navegador)
                prompt("¡Sesión creada! Copia el ID manualmente aquí:", gameSessionId);
            });
        } else {
            // Plan B: Si el navegador es muy antiguo o no tiene HTTPS
            prompt("¡Sesión creada! Copia el ID manualmente aquí:", gameSessionId);
        }

        return gameSessionId;
    } catch (error) {
        console.error('Error creando sesión:', error);
        alert('Error creando sesión: ' + error.message);
    }
}
    
    function joinGameSession(sessionId) {
        try {
            if (!sessionId || sessionId.trim() === '') {
                alert('Por favor ingresa un ID de sesión válido');
                return;
            }
            
            gameSessionId = sessionId.trim();
            isHost = false;
            console.log('Uniéndose a sesión:', gameSessionId);
            document.getElementById('session-info').innerHTML = `🎮 Sesión: ${sessionId.substring(0, 12)}... (CLIENTE)`;
            alert(`¡Uniéndote a sesión!\nID: ${gameSessionId}`);
            
            // Escuchar cambios en el estado del juego
            database.ref('games/' + sessionId).on('value', (snapshot) => {
                const gameData = snapshot.val();
                if(gameData) {
                    console.log('Datos recibidos:', gameData);
                    syncGameState(gameData);
                }
            });
        } catch (error) {
            console.error('Error uniéndose a sesión:', error);
            alert('Error uniéndose a sesión: ' + error.message);
        }
    }
    
    function syncGameState(gameData) {
        if(gameData.tablasRegistradas) {
            tablasRegistradas = new Set(gameData.tablasRegistradas);
            updateTablasRegistradasUI();
        }
        if(gameData.balotasSacadas) {
            balotasSacadas = gameData.balotasSacadas;
            updateBalotasUI();
        }
        if(gameData.ultimas5) {
            ultimas5 = gameData.ultimas5;
            updateHistorialUI();
        }
    }
    
    function updateFirebase() {
        // Solo el HOST (PC) tiene permiso de actualizar el estado completo (balotas e historial)
        if(!gameSessionId || !isHost) return;
        
        const gameData = {
            tablasRegistradas: Array.from(tablasRegistradas),
            balotasSacadas: balotasSacadas,
            ultimas5: ultimas5,
            timestamp: Date.now()
        };
        
        database.ref('games/' + gameSessionId).set(gameData);
    }
    
    function updateTablasRegistradasUI() {
        actualizarListaTablas();
    }
    
    function updateBalotasUI() {
        // Actualizar la visualización de balotas sacadas
        ['B','I','N','G','O'].forEach(letra => {
            const row = document.getElementById(`row-${letra}`);
            row.innerHTML = acumulados[letra].map(num => 
                `<div class="ball ${balotasSacadas.includes(num) ? 'drawn' : ''}">${num}</div>`
            ).join('');
        });
    }
    
    function updateHistorialUI() {
        ultimas5.forEach((balota, index) => {
            const ballEl = document.getElementById(`hb-${index}`);
            if(balota) {
                const letra = getLetra(balota);
                const numero = balota;
                ballEl.innerHTML = `<div class="h-letra">${letra}</div><div class="h-num">${numero}</div>`;
                ballEl.classList.add('active');
            } else {
                ballEl.innerHTML = `<div class="h-letra">-</div><div class="h-num">-</div>`;
                ballEl.classList.remove('active');
            }
        });
    }
    
    function getLetra(num) {
        if(num <= 15) return 'B';
        if(num <= 30) return 'I';
        if(num <= 45) return 'N';
        if(num <= 60) return 'G';
        return 'O';
    }
</script>
</body>
